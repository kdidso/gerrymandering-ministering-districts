<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ministering District Builder</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial;
}

#map{
height:100%;
width:100%;
}

.panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 4px 12px rgba(0,0,0,.25);
z-index:999;
max-width:260px;
}

button{
margin-top:6px;
width:100%;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<b>District Builder</b>

<input id="districtName"
placeholder="District name"/>

<button onclick="createDistrict()">Create District</button>

<button onclick="exportDistricts()">Export Districts</button>

<div id="districtList"></div>

</div>

<script>

/* -------------------- DATA SOURCES -------------------- */

const WARD_URL =
"https://kdidso.github.io/snow-canyon-map/ward_boundaries_JSO.geojson";

const MEMBERS_URL =
"https://kdidso.github.io/snow-canyon-map/member_locations_JSO.geojson";

const CELLS_URL =
"https://kdidso.github.io/snow-canyon-map/ward_cells.geojson";

/* -------------------- MAP -------------------- */

const map = L.map('map').setView([37.14,-113.63],13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

/* -------------------- STATE -------------------- */

let members;
let cells;
let districts=[];
let activeDistrict=null;

let memberMarkers=[];
let cellLayer;

/* -------------------- LOAD DATA -------------------- */

Promise.all([
fetch(WARD_URL).then(r=>r.json()),
fetch(MEMBERS_URL).then(r=>r.json()),
fetch(CELLS_URL).then(r=>r.json())
])
.then(([wardData,memberData,cellData])=>{

members=memberData;
cells=cellData;

L.geoJSON(wardData,{
style:{color:"#2b6cb0",weight:3,fillOpacity:.05}
}).addTo(map);

drawCells();
drawMembers();

});

function drawCells(){

cellLayer=L.geoJSON(cells,{
style:{
color:"#888",
weight:1,
fillOpacity:.05
}
}).addTo(map);

}

/* -------------------- MEMBERS -------------------- */

function drawMembers(){

members.features.forEach(feature=>{

const [lng,lat]=feature.geometry.coordinates;

const marker=L.circleMarker([lat,lng],{
radius:6,
color:"#444",
fillColor:"#888",
fillOpacity:.9
}).addTo(map);

marker.feature=feature;

marker.on("click",()=>assignMember(marker));

memberMarkers.push(marker);

});

}

/* -------------------- DISTRICTS -------------------- */

function createDistrict(){

const name=document.getElementById("districtName").value || "District";

const district={
id:Date.now(),
name:name,
cells:new Set()
};

districts.push(district);

activeDistrict=district;

updateDistrictList();

}

function updateDistrictList(){

const div=document.getElementById("districtList");

div.innerHTML="";

districts.forEach(d=>{

const b=document.createElement("button");

b.innerText=d.name;

b.onclick=()=>activeDistrict=d;

div.appendChild(b);

});

}

/* -------------------- CELL LOOKUP -------------------- */

function findCell(point){

for(const cell of cells.features){

if(turf.booleanPointInPolygon(point,cell))
return cell;

}

return null;

}

/* -------------------- ASSIGN MEMBER -------------------- */

function assignMember(marker){

if(!activeDistrict){
alert("Create/select a district first.");
return;
}

const point=turf.point(marker.feature.geometry.coordinates);

const cell=findCell(point);

if(!cell){
alert("No cell found.");
return;
}

const cellId=cell.properties.id || JSON.stringify(cell.geometry);

const assignedDistrict=districts.find(d=>d.cells.has(cellId));

if(assignedDistrict && assignedDistrict!==activeDistrict){

alert("This cell already belongs to another district.");
return;

}

activeDistrict.cells.add(cellId);

updateDistrictPolygons();

}

/* -------------------- DISSOLVE CELLS -------------------- */

let districtLayer;

function updateDistrictPolygons(){

if(districtLayer)map.removeLayer(districtLayer);

const features=[];

districts.forEach(d=>{

const districtCells=cells.features.filter(c=>{
const id=c.properties.id || JSON.stringify(c.geometry);
return d.cells.has(id);
});

if(!districtCells.length)return;

const fc=turf.featureCollection(districtCells);

const dissolved=turf.dissolve(fc);

dissolved.properties={
district:d.name
};

features.push(dissolved);

});

districtLayer=L.geoJSON(features,{
style:f=>({
color:"black",
weight:3,
fillOpacity:.3
})
}).addTo(map);

}

/* -------------------- EXPORT -------------------- */

function exportDistricts(){

const features=[];

districts.forEach(d=>{

const districtCells=cells.features.filter(c=>{
const id=c.properties.id || JSON.stringify(c.geometry);
return d.cells.has(id);
});

if(!districtCells.length)return;

const dissolved=turf.dissolve(
turf.featureCollection(districtCells)
);

dissolved.properties={
district:d.name
};

features.push(dissolved);

});

const geojson={
type:"FeatureCollection",
features:features
};

const blob=new Blob(
[JSON.stringify(geojson,null,2)],
{type:"application/json"}
);

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download="districts.geojson";
a.click();

}

</script>

</body>
</html>
